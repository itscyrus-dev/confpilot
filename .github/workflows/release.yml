name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            rust-targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg
          - name: macOS Intel
            platform: macos-latest
            rust-targets: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles app,dmg
          - name: Windows x64
            platform: windows-latest
            rust-targets: ""
            args: --bundles nsis,msi

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload release bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}
          releaseName: ConfigPilot ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}
          releaseBody: See the assets below to download and install ConfigPilot.
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          releaseCommitish: ${{ github.sha }}
          args: ${{ matrix.args }}
